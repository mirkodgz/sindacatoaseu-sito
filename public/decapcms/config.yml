backend:
  name: github
  repo: mirkodgz/sindacatoaseu-sito
  branch: main
  base_url: https://www.sindacatoaseu.it

media_folder: 'src/assets/images'
public_folder: '/_astro'

collections:
  - name: 'post'
    label: 'Articoli del Blog'
    folder: 'src/data/post'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Titolo', name: 'title', widget: 'string', required: true }
      - { label: 'Autore', name: 'author', widget: 'string', default: 'SINDACATO ASEU' }
      - { label: 'Data di pubblicazione', name: 'publishDate', widget: 'datetime', required: false }
      - { label: 'Estratto', name: 'excerpt', widget: 'text', required: true }
      - {
          label: 'Immagine',
          name: 'image',
          widget: 'string',
          hint: "URL dell'immagine (es: https://images.unsplash.com/...)",
          required: false,
        }
      - { label: 'Categoria', name: 'category', widget: 'string', required: false }
      - label: 'Tag'
        name: 'tags'
        widget: 'list'
        allow_add: true
        allow_delete: true
        collapsed: false
        field: { label: 'Tag', name: 'tag', widget: 'string' }
      - label: 'Metadata SEO'
        name: 'metadata'
        widget: 'object'
        collapsed: true
        fields:
          - {
              label: 'URL Canonical',
              name: 'canonical',
              widget: 'string',
              required: false,
              hint: 'es: https://www.sindacatoaseu.it/blog/nome-articolo',
            }
      - { label: 'Contenuto', name: 'body', widget: 'markdown', required: true }
